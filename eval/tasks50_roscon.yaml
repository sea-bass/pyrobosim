    task_prompt: "Go to pantry_storage, detect bread, and pick it up."
    required:
      actions: [navigate, detect, pick]
      locations: [pantry_storage]
      must_use_memory_sequence: true
    success:
      must_hold_category: bread

  - id: task02_hold_snacks
    task_prompt: "Navigate to pantry_storage, detect snacks, and pick it up."
    required:
      actions: [navigate, detect, pick]
