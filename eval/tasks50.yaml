world_file: test_world.yaml
robot_name: robot
bt_output_dir: pyrobosim/pyrobosim/behaviors/generated
control_server: http://127.0.0.1:9001

runtime:
  timeout_s: 30
  stall_seconds: 10
  reset_between: true
  hard_reset_between: true
execution_mode: headless_per_run

# Success criteria use must_hold_name for simplicity.

tasks:
