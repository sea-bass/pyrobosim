world_file: test_world.yaml
robot_name: robot
bt_output_dir: pyrobosim/pyrobosim/behaviors/generated
control_server: http://127.0.0.1:9001

runtime:
  timeout_s: 30
  stall_seconds: 10
  reset_between: true
  hard_reset_between: true
execution_mode: headless_per_run

# Extended success criteria include must_hold_name, object_at, robot_at, not_holding.

tasks:
  # --- Hold (20) ---
  - id: task01_hold_banana0
    task_prompt: "Go to table0_tabletop, detect banana0, and pick it up."
    required:
      actions: [navigate, detect, pick]
      locations: [table0_tabletop]
      condition_contains: banana0
      must_use_memory_sequence: true
    success:
      must_hold_name: banana0

  - id: task02_hold_gala
    task_prompt: "Navigate to table0_tabletop and pick gala after detecting it."
    required:
      actions: [navigate, detect, pick]
      locations: [table0_tabletop]
      condition_contains: gala
      must_use_memory_sequence: true
    success:
      must_hold_name: gala

  - id: task03_hold_apple0
    task_prompt: "At my_desk_desktop, detect apple0 and pick it up."
    required:
      actions: [navigate, detect, pick]
      locations: [my_desk_desktop]
      condition_contains: apple0
      must_use_memory_sequence: true
    success:
      must_hold_name: apple0

