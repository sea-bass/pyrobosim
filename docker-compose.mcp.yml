services:
  pyrobosim:
    build:
      context: /Users/jonathansalfity/Documents/dev/pyrobosim
      dockerfile: docker/Dockerfile
    image: pyrobosim_mcp:latest
    container_name: pyrobosim
    environment:
      - DISPLAY=host.docker.internal:0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /Users/jonathansalfity/Documents/dev/pyrobosim:/workspace/pyrobosim
    ports:
      - "9000:9000"
      - "9001:9001"
    working_dir: /workspace/pyrobosim/pyrobosim
    command: >-
      bash -lc "sleep infinity"
    tty: true
    stdin_open: true
